<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard IA Financeira</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial;
}

.container {
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:300px 1fr;
    gap:20px;
}

.card {
    background:rgba(255,255,255,0.03);
    padding:20px;
    border-radius:12px;
}

.kpis {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.big { font-size:20px; font-weight:bold; }

canvas {
    width:100% !important;
    height:400px !important;
}

.ai-box {
    margin-top:20px;
    background:rgba(0,210,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    padding:15px;
    border-radius:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="grid">

<div class="card">

<h3>Simulação</h3>

<p>Inicial</p>
<input type="number" id="init" value="30000">

<p>Aporte anual</p>
<input type="number" id="aporte" value="30000">

<p>Taxa % ao mês</p>
<input type="number" id="taxa" value="2.5">

<p>Anos</p>
<input type="number" id="anos" value="10">

</div>

<div>

<div class="kpis">
<div class="card"><p>Patrimônio</p><div class="big" id="total"></div></div>
<div class="card"><p>Investido</p><div class="big" id="investido"></div></div>
<div class="card"><p>Lucro</p><div class="big" id="lucro"></div></div>
<div class="card"><p>Renda</p><div class="big" id="renda"></div></div>
</div>

<canvas id="chart"></canvas>

<div class="ai-box" id="ai"></div>

</div>
</div>
</div>

<script>
const brl = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
let chart;

function simulate(){
let init = +initEl.value;
let aporte = +aporteEl.value;
let taxa = (+taxaEl.value)/100;
let anos = +anosEl.value;

let meses = anos*12;
let valor = init;
let investido = init;

let hist = [];

for(let i=1;i<=meses;i++){
    valor *= (1+taxa);
    if(i%12===0){
        valor += aporte;
        investido += aporte;
    }
    hist.push(valor);
}

return {hist, valor, investido};
}

function gerarIA(final, investido, taxa, anos){

let lucro = final - investido;
let perc = (lucro/final)*100;

let risco = taxa > 0.03 ? "alto" : taxa > 0.02 ? "moderado" : "baixo";

let tempoMilhao = final >= 1000000 ? "atingido" : "não atingido";

return `
📊 Análise Inteligente:

• Sua estratégia tem risco <b>${risco}</b>  
• ${perc.toFixed(1)}% do patrimônio vem de juros compostos  
• Objetivo de 1M: <b>${tempoMilhao}</b>  
• Em ${anos} anos você acumulou ${brl(final)}

💡 Sugestão:
${taxa > 0.03 
? "Sua taxa está agressiva. Considere cenários mais conservadores."
: "Estratégia equilibrada. Consistência será o principal fator."}
`;
}

function run(){

let {hist, valor, investido} = simulate();

// KPIs
total.innerText = brl(valor);
investidoEl.innerText = brl(investido);
lucro.innerText = brl(valor - investido);
renda.innerText = brl(valor*(+taxaEl.value/100));

// IA
ai.innerHTML = gerarIA(valor, investido, +taxaEl.value/100, +anosEl.value);

// chart fix
if(chart) chart.destroy();

let ctx = document.getElementById('chart').getContext('2d');

chart = new Chart(ctx,{
type:'line',
data:{
labels: hist.map((_,i)=>i+1),
datasets:[{
label:'Patrimônio',
data:hist,
borderColor:'#00d2ff',
backgroundColor:'rgba(0,210,255,0.1)',
fill:true,
tension:0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{labels:{color:'#aaa'}}
},
scales:{
x:{ticks:{color:'#666'}},
y:{ticks:{color:'#666'}}
}
}
});
}

// eventos
document.querySelectorAll('input').forEach(i=>{
i.addEventListener('input',run);
});

const initEl = document.getElementById('init');
const aporteEl = document.getElementById('aporte');
const taxaEl = document.getElementById('taxa');
const anosEl = document.getElementById('anos');

const total = document.getElementById('total');
const investidoEl = document.getElementById('investido');
const lucro = document.getElementById('lucro');
const renda = document.getElementById('renda');
const ai = document.getElementById('ai');

run();
</script>

</body>
</html>

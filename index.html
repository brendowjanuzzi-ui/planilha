<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Aportes Anuais Recorrentes</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1b;
            --primary: #2d3436;
            --accent: #00b894;
            --secondary: #0984e3;
            --border: #dfe6e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2rem; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #636e72; }
        .input-group input {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--secondary); outline: none; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
        .stat-box h2 { font-size: 1.5rem; }
        .stat-box.highlight { background: var(--accent); }

        .chart-container { height: 450px; position: relative; }

        button {
            grid-column: 1 / -1;
            padding: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simulador de Liberdade Financeira</h1>
        <p>Projeção com aportes anuais recorrentes de R$ 30k+</p>
    </header>

    <div class="card">
        <div class="controls">
            <div class="input-group">
                <label>Capital Inicial (R$)</label>
                <input type="number" id="initCap" value="30000">
            </div>
            <div class="input-group">
                <label>Aporte Todo Ano (R$)</label>
                <input type="number" id="annualInp" value="30000">
            </div>
            <div class="input-group">
                <label>Rendimento Mensal (%)</label>
                <input type="number" id="rateInp" value="2.5" step="0.1">
            </div>
            <div class="input-group">
                <label>Quantos Anos?</label>
                <input type="number" id="yearsInp" value="10">
            </div>
            <button onclick="updateSim()">Simular Crescimento</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <p>Total Investido do Bolso</p>
                <h2 id="totalInvested">R$ 0,00</h2>
            </div>
            <div class="stat-box">
                <p>Juros Recebidos</p>
                <h2 id="totalInterests">R$ 0,00</h2>
            </div>
            <div class="stat-box highlight">
                <p>Patrimônio Final</p>
                <h2 id="finalBalance">R$ 0,00</h2>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    const formatCurrency = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    function updateSim() {
        const initial = parseFloat(document.getElementById('initCap').value) || 0;
        const annual = parseFloat(document.getElementById('annualInp').value) || 0;
        const monthlyRate = (parseFloat(document.getElementById('rateInp').value) || 0) / 100;
        const years = parseInt(document.getElementById('yearsInp').value) || 1;

        const months = years * 12;
        let currentBalance = initial;
        let investedSum = initial;

        let labels = ['Início'];
        let balanceData = [initial];
        let investedData = [initial];

        for (let m = 1; m <= months; m++) {
            // 1. O dinheiro que já está lá rende
            currentBalance += currentBalance * monthlyRate;

            // 2. Lógica Recorrente: A cada 12 meses, você injeta o novo aporte
            if (m % 12 === 0) {
                currentBalance += annual;
                investedSum += annual;
            }

            labels.push(`Mês ${m}`);
            balanceData.push(currentBalance);
            investedData.push(investedSum);
        }

        // Atualizar Painel
        document.getElementById('totalInvested').innerText = formatCurrency(investedSum);
        document.getElementById('totalInterests').innerText = formatCurrency(currentBalance - investedSum);
        document.getElementById('finalBalance').innerText = formatCurrency(currentBalance);

        renderChart(labels, balanceData, investedData);
    }

    function renderChart(labels, balances, invested) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Patrimônio Total',
                        data: balances,
                        borderColor: '#00b894',
                        backgroundColor: 'rgba(0, 184, 148, 0.1)',
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0
                    },
                    {
                        label: 'Total Investido (Aportes)',
                        data: invested,
                        borderColor: '#0984e3',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0,
                        stepped: true // Cria o efeito de "escada" anual
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: (context) => `${context.dataset.label}: ${formatCurrency(context.raw)}`
                        }
                    }
                },
                scales: {
                    y: {
                        ticks: { callback: (value) => 'R$ ' + (value/1000) + 'k' }
                    },
                    x: {
                        ticks: { maxTicksLimit: 12 }
                    }
                }
            }
        });
    }

    window.onload = updateSim;
</script>
</body>
</html>

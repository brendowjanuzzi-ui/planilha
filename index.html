<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Financial Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --bg-dark: #0f172a;
            --card-glass: rgba(255, 255, 255, 0.05);
            --text-neon: #00f2fe;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .scene {
            width: 90%;
            max-width: 1100px;
            transition: transform 0.1s ease;
        }

        .card-3d {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            transform-style: preserve-3d;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateZ(50px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-neon);
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--text-neon);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .display-3d {
            position: relative;
            transform: translateZ(80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #chartContainer {
            width: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.3));
        }

        .stats-overlay {
            text-align: center;
            margin-top: 20px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-neon);
            font-size: 0.9rem;
            letter-spacing: 3px;
        }

        button {
            margin-top: 10px;
            background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow));
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4);
        }

        @media (max-width: 850px) {
            .card-3d { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="scene" id="scene">
    <div class="card-3d" id="card">
        <div class="controls">
            <h2 style="margin-bottom: 10px;">Quantum Finance</h2>
            <div class="input-group">
                <label>Capital Base (R$)</label>
                <input type="number" id="capBase" value="30000">
            </div>
            <div class="input-group">
                <label>Injeção Anual (R$)</label>
                <input type="number" id="annualInp" value="30000">
            </div>
            <div class="input-group">
                <label>Yield Mensal (%)</label>
                <input type="number" id="rateInp" value="2.5" step="0.1">
            </div>
            <div class="input-group">
                <label>Horizonte (Anos)</label>
                <input type="number" id="yearsInp" value="5">
            </div>
            <button onclick="updateVisuals()">Processar Matriz</button>
        </div>

        <div class="display-3d">
            <div id="chartContainer">
                <canvas id="pizza3d"></canvas>
            </div>
            <div class="stats-overlay">
                <p class="stat-label">Renda Mensal Estimada</p>
                <div class="stat-value" id="incomeDisplay">R$ 0,00</div>
                <p class="stat-label" style="margin-top: 10px; font-size: 0.7rem;">Patrimônio Total: <span id="totalDisplay">R$ 0</span></p>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    // Efeito de Inclinação 3D conforme o mouse move
    const scene = document.getElementById('scene');
    const card = document.getElementById('card');

    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    function updateVisuals() {
        const base = parseFloat(document.getElementById('capBase').value);
        const annual = parseFloat(document.getElementById('annualInp').value);
        const rate = parseFloat(document.getElementById('rateInp').value) / 100;
        const years = parseInt(document.getElementById('yearsInp').value);

        let current = base;
        let totalInvested = base;

        for (let i = 1; i <= years * 12; i++) {
            current += current * rate;
            if (i % 12 === 0) {
                current += annual;
                totalInvested += annual;
            }
        }

        const juros = current - totalInvested;
        const rendaMensal = current * rate;

        document.getElementById('incomeDisplay').innerText = rendaMensal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('totalDisplay').innerText = current.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        renderPizza(base, (totalInvested - base), juros);
    }

    function renderPizza(base, aportes, juros) {
        const ctx = document.getElementById('pizza3d').getContext('2d');
        
        if (myChart) myChart.destroy();

        // Gradientes para efeito 3D no gráfico
        const grad1 = ctx.createLinearGradient(0, 0, 0, 400);
        grad1.addColorStop(0, '#00f2fe');
        grad1.addColorStop(1, '#4facfe');

        const grad2 = ctx.createLinearGradient(0, 0, 0, 400);
        grad2.addColorStop(0, '#3a7bd5');
        grad2.addColorStop(1, '#00d2ff');

        const grad3 = ctx.createLinearGradient(0, 0, 0, 400);
        grad3.addColorStop(0, '#f093fb');
        grad3.addColorStop(1, '#f5576c');

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Capital Inicial', 'Aportes Anuais', 'Juros Acumulados'],
                datasets: [{
                    data: [base, aportes, juros],
                    backgroundColor: [grad2, grad1, grad3],
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 2,
                    hoverOffset: 20
                }]
            },
            options: {
                cutout: '70%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#fff', font: { size: 10, family: 'Segoe UI' } }
                    }
                }
            }
        });
    }

    window.onload = updateVisuals;
</script>
</body>
</html>

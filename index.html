<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial;
}

.container {
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:300px 1fr;
    gap:20px;
}

.card {
    background:rgba(255,255,255,0.03);
    padding:20px;
    border-radius:12px;
}

h3 { margin-top:0; }

.slider {
    width:100%;
}

.kpis {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.big { font-size:20px; font-weight:bold; }

.green { color:#00ff88; }
.blue { color:#00d2ff; }
.purple { color:#9b59b6; }

canvas { height:400px!important; }
</style>
</head>

<body>

<div class="container">
<div class="grid">

<div class="card">

<h3>Simulação</h3>

<p>Inicial: <span id="vInit"></span></p>
<input type="range" min="0" max="200000" step="5000" value="30000" id="init">

<p>Aporte anual: <span id="vAporte"></span></p>
<input type="range" min="0" max="100000" step="5000" value="30000" id="aporte">

<p>Taxa (% a.m): <span id="vTaxa"></span></p>
<input type="range" min="0.5" max="5" step="0.1" value="2.5" id="taxa">

<p>Anos: <span id="vAnos"></span></p>
<input type="range" min="1" max="30" value="10" id="anos">

</div>

<div>

<div class="kpis">
<div class="card"><p>Patrimônio</p><div class="big" id="total"></div></div>
<div class="card"><p>CAGR</p><div class="big green" id="cagr"></div></div>
<div class="card"><p>1M em</p><div class="big blue" id="milhao"></div></div>
<div class="card"><p>% Juros</p><div class="big purple" id="juros"></div></div>
<div class="card"><p>Renda</p><div class="big" id="renda"></div></div>
</div>

<canvas id="chart"></canvas>

</div>
</div>
</div>

<script>
const brl = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

let chart;

function simulate(rateMultiplier){

let init = +initEl.value;
let aporte = +aporteEl.value;
let taxa = (+taxaEl.value/100)*rateMultiplier;
let anos = +anosEl.value;

let meses = anos*12;
let valor = init;

let hist = [];

for(let i=1;i<=meses;i++){

    valor *= (1+taxa);

    if(i%12===0) valor += aporte;

    hist.push(valor);
}

return hist;
}

function run(){

// UI values
vInit.innerText = brl(+initEl.value);
vAporte.innerText = brl(+aporteEl.value);
vTaxa.innerText = taxaEl.value + "%";
vAnos.innerText = anosEl.value + " anos";

// cenários
let base = simulate(1);
let conservador = simulate(0.7);
let agressivo = simulate(1.3);

let final = base[base.length-1];
let investido = (+initEl.value + (+aporteEl.value * +anosEl.value));

total.innerText = brl(final);

// CAGR
let cagrVal = Math.pow(final/investido,1/+anosEl.value)-1;
cagr.innerText = (cagrVal*100).toFixed(1)+"%";

// % juros
juros.innerText = ((final-investido)/final*100).toFixed(1)+"%";

// renda
renda.innerText = brl(final*(+taxaEl.value/100));

// milhão
let m = base.findIndex(v=>v>=1000000);
milhao.innerText = m>0 ? (m/12).toFixed(1)+" anos" : "—";

// chart
if(chart) chart.destroy();

chart = new Chart(chartEl,{
type:'line',
data:{
labels: base.map((_,i)=>i+1),
datasets:[
{label:'Conservador',data:conservador,borderColor:'#00ff88',tension:0.3},
{label:'Base',data:base,borderColor:'#00d2ff',tension:0.3},
{label:'Agressivo',data:agressivo,borderColor:'#9b59b6',tension:0.3}
]
},
options:{
plugins:{legend:{labels:{color:'#aaa'}}},
scales:{
x:{ticks:{color:'#666'}},
y:{ticks:{color:'#666'}}
}
}
});

}

// eventos tempo real
document.querySelectorAll('input').forEach(i=>{
i.addEventListener('input',run);
});

const initEl = document.getElementById('init');
const aporteEl = document.getElementById('aporte');
const taxaEl = document.getElementById('taxa');
const anosEl = document.getElementById('anos');

run();
</script>

</body>
</html>

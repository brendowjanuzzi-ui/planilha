<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Identico - ROQT Style</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --neon-purple: #9b59b6;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fcfcfc;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            width: 95%;
            max-width: 1300px;
            height: 90vh;
        }

        /* --- CABEÇALHO (Estilo Referência) --- */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 2px solid var(--border);
        }

        header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
        }

        header .controls {
            display: flex;
            gap: 10px;
        }

        header select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 6px;
        }

        /* --- PAINEL DE CONTROLE (Sidebar) --- */
        .sidebar {
            grid-row: 2;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; text-transform: uppercase; color: #888; }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: var(--neon-green);
            font-size: 1.1rem;
            font-weight: bold;
        }
        button {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
        }

        /* --- STAGE KPIs (Cards da Referência) --- */
        .stage-kpis {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .kpi-card h4 { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .kpi-value { font-size: 1.8rem; font-weight: bold; color: white; margin: 10px 0; }
        .kpi-trend { font-size: 0.8rem; color: var(--neon-green); }

        /* Estilo da Borda Esquerda da Referência */
        .kpi-card::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; height: 60%; width: 4px;
            background: var(--neon-blue);
            border-radius: 0 4px 4px 0;
        }
        .kpi-card.income::before { background: var(--neon-purple); }

        /* --- GRÁFICO (Identico ao Estilo Barras da Imagem) --- */
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-container { height: 100%; position: relative; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; grid-template-rows: auto; }
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>DASHBOARD OVERVIEW</h1>
        <div class="controls">
            <select>
                <option>Últimos 12 Meses</option>
            </select>
        </div>
    </header>

    <div class="sidebar">
        <h3 style="color: var(--neon-blue); margin-bottom: 10px;">Configuração</h3>
        <p style="font-size: 0.8rem; color: #666;">Aporte anual recorrente: R$ 30k</p>
        
        <div class="input-group">
            <label>Investimento Inicial (R$)</label>
            <input type="number" id="initCap" value="30000">
        </div>
        
        <div class="input-group">
            <label>Aporte Todo Ano (R$)</label>
            <input type="number" id="annualInp" value="30000">
        </div>
        
        <div class="input-group">
            <label>Rendimento Mensal (%)</label>
            <input type="number" id="rateInp" value="2.5" step="0.1">
        </div>
        
        <div class="input-group">
            <label>Quantos Anos?</label>
            <input type="number" id="yearsInp" value="10">
        </div>

        <button onclick="updateDashboard()">Processar Matriz</button>
    </div>

    <div class="stage-kpis">
        <div class="kpi-grid">
            <div class="kpi-card">
                <h4>Patrimônio Total</h4>
                <div class="kpi-value" id="kpiTotal">R$ 30.000</div>
                <div class="kpi-trend">AA R$ 0,00 (+100%)</div>
            </div>
            <div class="kpi-card income">
                <h4>Renda Mensal Estimada</h4>
                <div class="kpi-value" id="kpiIncome" style="color: var(--neon-purple);">R$ 750</div>
                <div class="kpi-trend" style="color: var(--neon-purple);">Taxa: 2.5% m.m.</div>
            </div>
        </div>

        <div class="chart-card">
            <h4 style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Evolução Patrimonial Anual</h4>
            <div class="chart-container">
                <canvas id="evolutionChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart = null;
    const formatBRL = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    function updateDashboard() {
        const initial = parseFloat(document.getElementById('initCap').value) || 0;
        const annual = parseFloat(document.getElementById('annualInp').value) || 0;
        const rateMensal = (parseFloat(document.getElementById('rateInp').value) || 0) / 100;
        const years = parseInt(document.getElementById('yearsInp').value) || 1;

        const months = years * 12;
        let current = initial;
        let labelsBar = ['Início'];
        let dataBar = [initial];

        for (let m = 1; m <= months; m++) {
            current += current * rateMensal;
            
            // Lógica recorrente: Injeta 30k a cada 12 meses
            if (m % 12 === 0) {
                current += annual;
                
                // Salvar ponto anual no gráfico de barras
                labelsBar.push(`Ano ${m/12}`);
                dataBar.push(current);
            }
        }

        // Atualizar KPIs
        document.getElementById('kpiTotal').innerText = formatBRL(current);
        document.getElementById('kpiIncome').innerText = formatBRL(current * rateMensal);

        renderChart(labelsBar, dataBar);
    }

    // Gráfico de Barras idêntico ao estilo da Referência
    function renderChart(labels, data) {
        const ctx = document.getElementById('evolutionChart').getContext('2d');
        if (myChart) myChart.destroy();

        // Gradiente idêntico ao ROQT (Amarelo Neon para Amarelo Escuro)
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(0, 210, 255, 1)'); // Blue Neon Top
        gradient.addColorStop(1, 'rgba(0, 210, 255, 0.2)'); // Blue Neon Bottom

        myChart = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico idêntico
            data: {
                labels: labels,
                datasets: [{
                    label: 'Patrimônio',
                    data: data,
                    backgroundColor: gradient,
                    borderRadius: 6, // Cantos arredondados nas barras
                    barThickness: 'flex'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: (context) => formatBRL(context.raw) } }
                },
                scales: {
                    y: {
                        ticks: { color: '#888', callback: (v) => 'R$ ' + (v/1000) + 'k' },
                        grid: { color: 'rgba(255,255,255,0.03)' }
                    },
                    x: {
                        ticks: { color: '#888' },
                        grid: { display: false }
                    }
                }
            }
        });
    }

    window.onload = updateDashboard;
</script>
</body>
</html>

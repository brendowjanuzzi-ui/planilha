<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ultra Real Earth</title>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{display:block;}
</style>
</head>

<body>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz principal (sol)
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,3,5);
scene.add(light);

// =====================
// TEXTURAS (REALISM LAYERED)
// =====================
const loader = new THREE.TextureLoader();

const dayMap = loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
const nightMap = loader.load("https://threejs.org/examples/textures/planets/earth_lights_2048.png");

// =====================
// SHADER SIMPLIFICADO (DIA + NOITE)
// =====================
const earth = new THREE.Mesh(
new THREE.SphereGeometry(1,64,64),
new THREE.MeshStandardMaterial({
map: dayMap
})
);

scene.add(earth);

// camada de luz noturna (glow cidades)
const night = new THREE.Mesh(
new THREE.SphereGeometry(1.001,64,64),
new THREE.MeshBasicMaterial({
map: nightMap,
transparent:true,
blending:THREE.AdditiveBlending
})
);

scene.add(night);

// =====================
// NUVENS (camada extra)
// =====================
const cloudsTex = loader.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png");

const clouds = new THREE.Mesh(
new THREE.SphereGeometry(1.01,64,64),
new THREE.MeshBasicMaterial({
map: cloudsTex,
transparent:true,
opacity:0.4
})
);

scene.add(clouds);

// =====================
// ANIMAÇÃO CINEMATOGRÁFICA
// =====================
function animate(){

requestAnimationFrame(animate);

// rotação principal
earth.rotation.y += 0.0015;
night.rotation.y += 0.0015;

// nuvens mais rápidas (efeito atmosfera real)
clouds.rotation.y += 0.0025;

// leve inclinação estilo cinema
earth.rotation.x = Math.sin(Date.now()*0.0003)*0.15;

renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>

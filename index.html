<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Financial Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --neon-blue: #00d2ff;
            --neon-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }

        /* --- PAINEL DE CONTROLE (ESTÁTICO) --- */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: var(--neon-blue);
            font-size: 1rem;
            font-weight: bold;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); }

        button {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- ESPAÇO 3D (FOCO NO GRÁFICO) --- */
        .stage {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Profundidade do olhar */
        }

        /* O "Cilindro" da Pizza */
        .chart-3d-container {
            position: relative;
            width: 500px;
            height: 500px;
            transform-style: preserve-3d;
            transform: rotateX(45deg); /* Deita a pizza na mesa */
            animation: rotateOrbit 20s linear infinite;
            transition: transform 0.5s ease;
        }

        @keyframes rotateOrbit {
            from { transform: rotateX(55deg) rotateZ(0deg); }
            to { transform: rotateX(55deg) rotateZ(360deg); }
        }

        /* Efeito de Espessura (Sombra projetada para baixo) */
        .chart-3d-container::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; width: 80%; height: 80%;
            background: var(--neon-blue);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            transform: translateZ(-50px);
        }

        /* Escala Numérica Flutuante */
        .numerical-scale {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(100px);
            text-align: center;
            pointer-events: none;
        }

        .income-val {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px var(--neon-blue);
            margin: 0;
        }

        .total-val {
            font-size: 1.2rem;
            color: var(--neon-green);
            opacity: 0.8;
            letter-spacing: 2px;
        }

        canvas {
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .chart-3d-container { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <h2 style="color: var(--neon-blue); margin-bottom: 10px;">Configuração</h2>
        
        <div class="input-group">
            <label>Investimento Inicial</label>
            <input type="number" id="initCap" value="30000">
        </div>
        
        <div class="input-group">
            <label>Aporte Todo Ano (R$)</label>
            <input type="number" id="annualInp" value="30000">
        </div>
        
        <div class="input-group">
            <label>Rendimento Mensal (%)</label>
            <input type="number" id="rateInp" value="2.5" step="0.1">
        </div>
        
        <div class="input-group">
            <label>Horizonte (Anos)</label>
            <input type="number" id="yearsInp" value="10">
        </div>

        <button onclick="calculate()">Processar Evolução</button>

        <div style="margin-top: 20px; font-size: 0.8rem; line-height: 1.6; color: #888;">
            <p>● Escala Numérica em 3D ativa</p>
            <p>● Aporte recorrente de R$ 30k/ano</p>
            <p>● Visualização de profundidade 45°</p>
        </div>
    </div>

    <div class="stage">
        <div class="numerical-scale">
            <p style="font-size: 0.7rem; text-transform: uppercase; color: var(--neon-blue);">Renda Mensal Gerada</p>
            <h1 class="income-val" id="incomeLabel">R$ 750</h1>
            <p class="total-val" id="totalLabel">Total: R$ 30.000</p>
        </div>

        <div class="chart-3d-container" id="disc">
            <canvas id="chartPizza"></canvas>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    function calculate() {
        const initial = parseFloat(document.getElementById('initCap').value) || 0;
        const annual = parseFloat(document.getElementById('annualInp').value) || 0;
        const rate = (parseFloat(document.getElementById('rateInp').value) || 0) / 100;
        const years = parseInt(document.getElementById('yearsInp').value) || 1;

        let current = initial;
        let totalInvested = initial;

        // Loop de crescimento com injeção anual de 30k
        for (let m = 1; m <= years * 12; m++) {
            current += current * rate;
            if (m % 12 === 0) {
                current += annual;
                totalInvested += annual;
            }
        }

        const juros = current - totalInvested;
        const rendaMensal = current * rate;

        // Atualiza Escala Numérica com animação
        animateValue("incomeLabel", rendaMensal);
        document.getElementById('totalLabel').innerText = `PATRIMÔNIO: ${current.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`;

        updateChart(initial, (totalInvested - initial), juros);
    }

    function animateValue(id, value) {
        const obj = document.getElementById(id);
        obj.innerText = value.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
    }

    function updateChart(base, aportes, juros) {
        const ctx = document.getElementById('chartPizza').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Base', 'Aportes', 'Juros'],
                datasets: [{
                    data: [base, aportes, juros],
                    backgroundColor: [
                        '#1e293b',    // Escuro
                        '#00d2ff',    // Neon Blue
                        '#00ff88'     // Neon Green
                    ],
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 5,
                    hoverOffset: 30
                }]
            },
            options: {
                cutout: '75%',
                plugins: {
                    legend: { display: false }
                },
                animation: {
                    animateScale: true,
                    animateRotate: true
                }
            }
        });
    }

    // Interatividade: Inclinar ao passar o mouse
    const stage = document.querySelector('.stage');
    const disc = document.getElementById('disc');

    stage.addEventListener('mousemove', (e) => {
        const rect = stage.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        
        // Ajusta a inclinação dinamicamente além da animação
        disc.style.transform = `rotateX(${55 + y * 20}deg) rotateZ(${x * 20}deg)`;
    });

    stage.addEventListener('mouseleave', () => {
        disc.style.transform = `rotateX(55deg)`;
    });

    window.onload = calculate;
</script>
</body>
</html>

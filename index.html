<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SaaS Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#050505;
--card:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.08);
--blue:#00d2ff;
--green:#00ff88;
--purple:#9b59b6;
}

body{
margin:0;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
font-family:Segoe UI;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
color:#888;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
position:relative;
overflow:hidden;
}

/* glow */
.card::before{
content:'';
position:absolute;
left:0;
top:20%;
height:60%;
width:4px;
background:var(--blue);
box-shadow:0 0 12px var(--blue);
}

.value{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.trend{
font-size:12px;
color:var(--green);
}

/* CHARTS */
.charts{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

canvas{
height:300px !important;
}

/* IA */
.ai{
margin-top:20px;
background:rgba(0,210,255,0.05);
border:1px solid rgba(0,210,255,0.2);
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h3>DASHBOARD SaaS</h3>
</div>

<div class="grid">
<div class="card"><p>Receita</p><div class="value" id="rev"></div><div class="trend" id="revT"></div></div>
<div class="card"><p>Lucro</p><div class="value" id="luc"></div><div class="trend" id="lucT"></div></div>
<div class="card"><p>Clientes</p><div class="value" id="cli"></div><div class="trend">+8%</div></div>
<div class="card"><p>Crescimento</p><div class="value" id="growth"></div><div class="trend">YoY</div></div>
</div>

<div class="charts">
<div class="card"><canvas id="bar"></canvas></div>
<div class="card"><canvas id="line"></canvas></div>
</div>

<div class="ai" id="ai"></div>

</div>

<script>

// ===== STATE (importante pra SaaS)
const state = {
data: [12,19,10,25,22,30,28,35,40,45,50,60]
};

// ===== UTILS
const brl = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

// ===== CALCULOS
function calc(){

let data = state.data;

let total = data.reduce((a,b)=>a+b,0)*10000;
let last = data[data.length-1]*10000;
let prev = data[data.length-2]*10000;

let growth = ((last-prev)/prev)*100;

return {total,last,growth};
}

// ===== IA SaaS
function aiInsight(total,growth){

if(growth > 10){
return "🚀 Forte crescimento. Considere escalar aquisição de clientes.";
}
if(growth > 5){
return "📈 Crescimento saudável. Otimize conversão.";
}
return "⚠️ Crescimento lento. Revise estratégia.";
}

// ===== RENDER
function render(){

let {total,last,growth} = calc();

rev.innerText = brl(total);
luc.innerText = brl(total*0.3);
cli.innerText = Math.floor(total/10000);

growthEl.innerText = growth.toFixed(1)+"%";

revT.innerText = "+"+growth.toFixed(1)+"%";
lucT.innerText = "+"+(growth*0.8).toFixed(1)+"%";

ai.innerText = aiInsight(total,growth);

renderCharts();
}

// ===== CHARTS
let barChart, lineChart;

function renderCharts(){

let ctx1 = document.getElementById('bar').getContext('2d');
let ctx2 = document.getElementById('line').getContext('2d');

if(barChart) barChart.destroy();
if(lineChart) lineChart.destroy();

let gradient = ctx1.createLinearGradient(0,0,0,300);
gradient.addColorStop(0,'#00ff88');
gradient.addColorStop(1,'rgba(0,255,136,0.1)');

barChart = new Chart(ctx1,{
type:'bar',
data:{
labels:state.data.map((_,i)=>i+1),
datasets:[{data:state.data,backgroundColor:gradient,borderRadius:6}]
},
options:{plugins:{legend:{display:false}}}
});

lineChart = new Chart(ctx2,{
type:'line',
data:{
labels:state.data.map((_,i)=>i+1),
datasets:[{
data:state.data,
borderColor:'#00d2ff',
tension:0.3,
fill:false
}]
},
options:{plugins:{legend:{display:false}}}
});
}

// init
const growthEl = document.getElementById('growth');

render();

</script>

</body>
</html>

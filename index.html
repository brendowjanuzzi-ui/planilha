<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SaaS Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#050505;
--card:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.08);
--blue:#00d2ff;
--green:#00ff88;
}

body{
margin:0;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
font-family:Segoe UI;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
}

/* SIDEBAR */
.sidebar{
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
}

.sidebar label{
font-size:12px;
color:#888;
margin-top:10px;
display:block;
}

.sidebar input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
background:black;
border:1px solid var(--border);
color:var(--green);
border-radius:6px;
}

/* KPIs */
.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
}

.value{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

/* CHART */
canvas{
height:320px !important;
}

/* IA */
.ai{
margin-top:20px;
padding:15px;
border-radius:10px;
background:rgba(0,210,255,0.05);
border:1px solid rgba(0,210,255,0.2);
}
</style>
</head>

<body>

<div class="container">
<div class="grid">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Simulação</h3>

<label>Investimento Inicial</label>
<input type="range" id="initRange" min="0" max="200000" step="1000" value="30000">
<input type="text" id="initInput">

<label>Aporte Anual</label>
<input type="range" id="aporteRange" min="0" max="100000" step="1000" value="30000">
<input type="text" id="aporteInput">

<label>Taxa (% ao mês)</label>
<input type="range" id="taxaRange" min="0.5" max="5" step="0.1" value="2.5">
<input type="number" id="taxaInput" step="0.1">

<label>Anos</label>
<input type="range" id="anosRange" min="1" max="30" value="10">
<input type="number" id="anosInput">

</div>

<!-- DASHBOARD -->
<div>

<div class="kpis">
<div class="card"><p>Patrimônio</p><div class="value" id="total"></div></div>
<div class="card"><p>Investido</p><div class="value" id="investido"></div></div>
<div class="card"><p>Lucro</p><div class="value" id="lucro"></div></div>
<div class="card"><p>Renda Mensal</p><div class="value" id="renda"></div></div>
</div>

<canvas id="chart"></canvas>

<div class="ai" id="ai"></div>

</div>
</div>
</div>

<script>

// ===== STATE
const state = {
init:30000,
aporte:30000,
taxa:2.5,
anos:10
};

// ===== UTILS
const brl = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

function formatBRLInput(value){
return Number(value).toLocaleString('pt-BR');
}

function parseBRL(value){
return Number(value.replace(/\./g,'').replace(',','.')) || 0;
}

// ===== SIMULAÇÃO
function simulate(){

let valor = state.init;
let investido = state.init;
let hist = [];

for(let i=1;i<=state.anos*12;i++){

valor *= (1 + state.taxa/100);

if(i%12===0){
valor += state.aporte;
investido += state.aporte;
}

hist.push(valor);
}

return {hist, valor, investido};
}

// ===== IA
function aiText(v, inv){

let lucro = v - inv;
let perc = (lucro/v)*100;

if(perc > 60) return "🚀 Estratégia excelente. Juros compostos dominando.";
if(perc > 40) return "📈 Boa performance. Continue consistente.";
return "⚠️ Baixo efeito de juros. Aumente tempo ou taxa.";
}

// ===== CHART
let chart;

function renderChart(hist){

if(chart) chart.destroy();

let ctx = document.getElementById('chart').getContext('2d');

let grad = ctx.createLinearGradient(0,0,0,300);
grad.addColorStop(0,'#00ff88');
grad.addColorStop(1,'rgba(0,255,136,0.1)');

chart = new Chart(ctx,{
type:'bar',
data:{
labels:hist.map((_,i)=>i+1),
datasets:[{
data:hist,
backgroundColor:grad,
borderRadius:6
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{ticks:{color:'#666'}},
y:{ticks:{color:'#666'}}
}
}
});
}

// ===== RENDER
function render(){

let {hist, valor, investido} = simulate();

total.innerText = brl(valor);
investidoEl.innerText = brl(investido);
lucro.innerText = brl(valor - investido);
renda.innerText = brl(valor*(state.taxa/100));

ai.innerText = aiText(valor, investido);

renderChart(hist);
}

// ===== SYNC INPUTS (PRO)
function sync(range, input, key, isCurrency=true){

function fromRange(){
state[key] = +range.value;
input.value = isCurrency ? formatBRLInput(range.value) : range.value;
render();
}

function fromInput(){
let val = isCurrency ? parseBRL(input.value) : +input.value;
state[key] = val;
range.value = val;
input.value = isCurrency ? formatBRLInput(val) : val;
render();
}

range.addEventListener('input', fromRange);
input.addEventListener('change', fromInput);

// init
fromRange();
}

// ===== ELEMENTOS
const total = document.getElementById('total');
const investidoEl = document.getElementById('investido');
const lucro = document.getElementById('lucro');
const renda = document.getElementById('renda');
const ai = document.getElementById('ai');

// ===== INIT SYNC
sync(initRange, initInput, 'init');
sync(aporteRange, aporteInput, 'aporte');
sync(taxaRange, taxaInput, 'taxa', false);
sync(anosRange, anosInput, 'anos', false);

</script>

</body>
</html>
